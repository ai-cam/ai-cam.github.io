name: Auto-update past categories

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-categories:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update past categories
        run: python3 scripts/update-past-categories.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-update: move past events/calls to past categories"
          git push
