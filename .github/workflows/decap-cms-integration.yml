name: Decap CMS Integration

on:
  push:
    branches:
      - cms-edits
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

env:
  GITHUB_REPOSITORY: ${{ github.repository }}

jobs:
  # Auto-merge CMS edits from authenticated CMS users
  auto-merge-cms-edits:
    name: Auto-merge CMS Edits
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/cms-edits'
    permissions:
      contents: write
      pull-requests: write
      checks: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: cms-edits
          fetch-depth: 0
      
      - name: Verify CMS commit signature
        id: verify
        run: |
          # Check if commit is from a known CMS user or Netlify Identity
          # This is a basic check - you may want to enhance this with more validation
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_EMAIL="${{ github.event.head_commit.author.email }}"
          
          echo "Commit author: $COMMIT_AUTHOR"
          echo "Commit email: $COMMIT_EMAIL"
          
          # Check if this looks like a CMS commit (Netlify Identity users typically have specific patterns)
          if [[ "$COMMIT_EMAIL" == *"netlify"* ]] || [[ "$COMMIT_EMAIL" == *"users.noreply.github.com"* ]]; then
            echo "is_cms_commit=true" >> $GITHUB_OUTPUT
          else
            echo "is_cms_commit=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Pull Request
        if: steps.verify.outputs.is_cms_commit == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: cms-edits-to-main
          base: main
          title: 'CMS Content Update: ${{ github.event.head_commit.message }}'
          body: |
            ## CMS Content Update
            
            This PR was automatically created from CMS edits.
            
            **Commit:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.event.head_commit.author.name }}
            **Date:** ${{ github.event.head_commit.timestamp }}
            
            ### Changes
            - Files modified via Decap CMS
            
            ---
            *This PR was automatically created by the Decap CMS Integration workflow.*
          commit-message: 'CMS: ${{ github.event.head_commit.message }}'
          labels: |
            cms
            automated
          draft: false
      
      - name: Auto-approve and merge (if configured)
        if: steps.verify.outputs.is_cms_commit == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Find the PR that was just created
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:cms-edits-to-main`,
              base: 'main'
            });
            
            if (prs.length > 0) {
              const pr = prs[0];
              
              // Add a comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '🤖 Automated PR created from CMS edits. Waiting for review...'
              });
              
              // Note: Auto-merge would require additional permissions and configuration
              // For security, we recommend manual review even for CMS edits
            }
  
