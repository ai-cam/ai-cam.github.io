# GitHub Repository Settings Configuration
# This file defines branch protection rules as code for the ai@cam repository
# These settings help prevent unauthorized modifications and enforce secure development practices

repository:
  name: ai-cam.github.io
  description: "University of Cambridge's flagship mission on AI - supporting AI that serves science, citizens and society"
  default_branch: main
  has_issues: true
  has_projects: true
  has_wiki: false
  has_downloads: true
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  allow_auto_merge: true
  delete_branch_on_merge: true

branches:
  # Main branch protection rules
  - name: main
    protection:
      # Require pull request reviews before merging
      # NOTE: For Decap CMS compatibility, consider:
      # 1. Using a separate 'cms-edits' branch for CMS content
      # 2. Configuring a GitHub App with bypass permissions for CMS
      # 3. Using the auto-merge workflow for trusted CMS commits
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        require_last_push_approval: false
        # Restrict who can dismiss pull request reviews
        dismissal_restrictions:
          users: []
          teams: []
      
      # Require status checks to pass before merging
      # NOTE: Make these optional or configure bypass for CMS if needed
      required_status_checks:
        strict: true
        contexts:
          - "ci/build"
          - "ci/test"
          - "ci/lint"
      
      # Enforce restrictions on who can push to this branch
      # This blocks direct pushes, including from Decap CMS
      enforce_admins: true
      required_linear_history: false
      allow_force_pushes: false
      allow_deletions: false
      
      # Require conversation resolution before merging
      required_conversation_resolution: true
      
      # Lock branch (prevents all pushes, including from admins)
      lock_branch: false
      
      # Allow fork syncing
      allow_fork_syncing: false
  
  # CMS edits branch - less protection for CMS workflow
  # Decap CMS should be configured to push to this branch instead of main
  - name: cms-edits
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 0  # No review required for CMS branch
        dismiss_stale_reviews: false
      required_status_checks:
        strict: false
        contexts: []  # No status checks required for CMS branch
      enforce_admins: false
      allow_force_pushes: false
      allow_deletions: false

