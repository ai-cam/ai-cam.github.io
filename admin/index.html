<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Pinned to 3.14.1 on 2026-07-23: 3.15.0 broke the CDN build (React JSX runtime
       migration, decaporg/decap-cms#7876). Unpin once a patched release ships.
       Track: https://github.com/ai-cam/ai-cam.github.io/issues/29 -->
  <script src="https://unpkg.com/decap-cms@3.14.1/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
